name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v7.3.1

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install dependencies
        run: uv sync --group dev --frozen

      - name: Lint
        run: uv run ruff check

      - name: Run tests
        run: uv run pytest

      - name: Build Python distributions
        run: uv build

      - name: Verify release version metadata
        run: |
          python - <<'PY'
          import json
          import os
          import tomllib
          from pathlib import Path

          pyproject = tomllib.loads(Path("pyproject.toml").read_text())
          manifest = json.loads(Path("manifest.json").read_text())
          version = pyproject["project"]["version"]
          expected_tag = f"v{version}"
          actual_tag = os.environ["GITHUB_REF_NAME"]

          if manifest["version"] != version:
              raise SystemExit(
                  f"manifest.json version {manifest['version']} does not match pyproject.toml version {version}"
              )

          if expected_tag != actual_tag:
              raise SystemExit(
                  f"Tag {actual_tag} does not match project version {expected_tag}"
              )
          PY

      - name: Validate MCPB manifest
        run: npx -y @anthropic-ai/mcpb@2.1.2 validate manifest.json

      - name: Create MCPB bundle
        run: npx -y @anthropic-ai/mcpb@2.1.2 pack . dist/arr-assistant-mcp-${{ github.ref_name }}.mcpb

      - name: Show MCPB bundle info
        run: npx -y @anthropic-ai/mcpb@2.1.2 info dist/arr-assistant-mcp-${{ github.ref_name }}.mcpb

      - name: Create or update GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1 || \
          gh release create "${GITHUB_REF_NAME}" --verify-tag --generate-notes
          gh release upload "${GITHUB_REF_NAME}" \
            dist/arr-assistant-mcp-${GITHUB_REF_NAME}.mcpb \
            dist/*.whl \
            dist/*.tar.gz \
            --clobber
