name: CI

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v7.3.1

      - name: Install dependencies
        run: uv sync --group dev --frozen

      - name: Lint
        run: uv run ruff check

      - name: Run tests
        run: uv run pytest
