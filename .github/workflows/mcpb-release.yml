name: Build and Release MCPB Bundle

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-mcpb:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install uv
      uses: astral-sh/setup-uv@v3
      with:
        version: "latest"

    - name: Install test dependencies
      run: uv sync --group dev

    - name: Run tests
      run: uv run pytest

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Validate MCPB manifest
      run: npx -y @anthropic-ai/mcpb@2.1.2 validate manifest.json

    - name: Create MCPB bundle
      run: npx -y @anthropic-ai/mcpb@2.1.2 pack . arr-assistant-mcp-${{ github.event.release.tag_name }}.mcpb

    - name: Show MCPB bundle info
      run: npx -y @anthropic-ai/mcpb@2.1.2 info arr-assistant-mcp-${{ github.event.release.tag_name }}.mcpb

    - name: Upload MCPB bundle to release
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        gh release upload ${{ github.event.release.tag_name }} arr-assistant-mcp-${{ github.event.release.tag_name }}.mcpb
